name: note記事生成→Discord通知（RayPhoneAI）
on:
  schedule:
    - cron: '30 12 * * *'  # 毎日 21:30 JST（UTC 12:30）
  workflow_dispatch:        # 手動トリガーも維持
jobs:
  note-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 依存ライブラリをインストール
        run: pip install requests pillow
      - name: 記事を生成して Discord に通知
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:          ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_HASHTAG_MODEL:  ${{ vars.GEMINI_HASHTAG_MODEL || 'gemini-2.5-flash-lite' }}
          EYECATCH_MODEL:        ${{ vars.EYECATCH_MODEL || 'gemini-2.5-flash-image' }}
          DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUNBUFFERED:      "1"
        run: python -u note_post.py
