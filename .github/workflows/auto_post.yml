name: ブログ自動投稿（手動のみ・スケジュール停止）
on:
  # ─────────────────────────────────────────────
  # 2026/05/10 ブログ集客を停止し note 単独運用へ移行
  # 自動スケジュールは無効化。手動実行 (workflow_dispatch) のみ残す
  # 元の設定: cron: '0 23 * * *'   # 毎日 08:00 JST
  # ─────────────────────────────────────────────
  workflow_dispatch:        # 必要時のみ手動実行
jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 依存ライブラリをインストール
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: 自動投稿を実行
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:      ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_USER:           ${{ secrets.GH_USER }}
          GH_REPO:           ${{ secrets.GH_REPO }}
          BLOG_URL:          ${{ secrets.BLOG_URL }}
          NOTE_URL:          ${{ secrets.NOTE_URL }}
          ADMIN_URL:         ${{ secrets.ADMIN_URL }}
          ADMIN_PASSWORD:    ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS:          "true"
          PYTHONUNBUFFERED:  "1"
        run: python -u auto_post.py
